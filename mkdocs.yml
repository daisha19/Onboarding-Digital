site_name: OnBoarding Digital
site_description: Documentação do sistema de onboarding digital para admissão de colaboradores.
site_url: https://daisha19.github.io/Onboarding-Digital/
repo_url: https://github.com/daisha19/Onboarding-Digital
repo_name: daisha19/Onboarding-Digital

theme:
  name: material
  language: pt-BR
  logo: assets/brand/logo.svg
  favicon: assets/brand/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    scheme: slate
    primary: navy
    accent: blue

  palette:
    - scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro
    - scheme: default
      primary: blue
      accent: teal
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Início: index.md
  - Produto:
      - MVP: mvp.md
      - Requisitos: requisitos.md
  - Engenharia:
      - Arquitetura: arquitetura.md
      - Stacks Utilizadas: stacks-utilizadas.md
      - Padrões de Desenvolvimento: padroes-desenvolvimento.md
  - Gestão:
      - Planejamento: planejamento.md
      - Reuniões: reunioes.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Início: index.md
  - Produto:
      - MVP: mvp.md
      - Requisitos: requisitos.md
  - Engenharia:
      - Arquitetura: arquitetura.md
      - Stacks Utilizadas: stacks-utilizadas.md
      - Padrões de Desenvolvimento: padroes-desenvolvimento.md
      - Operação do Backend: devops.md
  - Gestão:
      - Planejamento: planejamento.md
      - Reuniões: reunioes.md
